included:
  - EventExplorer

excluded:
  - .build
  - Package.swift
  - EventExplorerTests
  - EventExplorerUITests
  - EventExplorer/Assets.xcassets

disabled_rules:
  - line_length            # SwiftUI modifier chains commonly exceed default 120
  - todo                   # allow TODO/FIXME during time-boxed assignment
  - trailing_whitespace
  - identifier_name        # allows short names like `id`, `lat`, `lng` in models

opt_in_rules:
  - empty_count
  - force_unwrapping        # flag `!` — important given networking/optionals in this project
  - force_https
  - closure_spacing
  - unused_import
  - redundant_optional_initialization
  - vertical_whitespace_closing_braces

# Slightly relaxed thresholds — this is a 5-6hr assignment, not a mature codebase.
# A production timeline would tighten these back to SwiftLint defaults.
type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 500

cyclomatic_complexity:
  warning: 15

# Reviewer note: force_unwrapping is opted in deliberately since this project
# touches network responses, CoreData/SwiftData fetches, and CoreLocation —
# all common force-unwrap traps. Prefer guard/if-let or `??` defaults instead.
